    rel="stylesheet" />

  <title>Bhupesh's Bookshelf 📚</title>
</head>

<body>
  <h1 style="text-align: center">
    <a href="https://bhupesh.me/">Bhupesh's</a> Bookshelf 📚
  </h1>
  <p align="center">
    Welcome to my IRL <strike>bookshelf</strike> (books I've come across). The
    <span style="background-color: #ffe4b2">highlighted</span> ones are my
    recommendations.
  </p>
  <p id="last-updated"></p>

  <!-- Tabs -->
  <div class="container">
    <input type="radio" name="tabs" id="tab-bookshelf" class="tab-radio" checked />
    <input type="radio" name="tabs" id="tab-wishlist" class="tab-radio" />

    <div class="tabs">
      <label for="tab-bookshelf">📚 My Shelf</label>
      <label for="tab-wishlist">🛒 Wishlist</label>
    </div>

    <div class="tabs-container">
      <!-- Bookshelf Tab Content -->
      <div id="content-bookshelf" class="tab-content">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th class="header">Genre</th>
                <th class="header" id="on-the-shelf-header">On the Shelf</th>
                <th class="header" id="currently-reading-header">
                  Currently Reading
                </th>
                <th class="header" id="finished-reading-header">
                  Finished Reading
                </th>
              </tr>
            </thead>
            <tbody id="books-table-body"></tbody>
          </table>
        </div>
      </div>

      <!-- Wishlist Tab Content -->
      <div id="content-wishlist" class="tab-content">
        <div class="wishlist-container">
          <p style="text-align: center; font-size: 1.1em; margin-bottom: 20px;">
            <strong><span id="wishlist-count">0</span></strong> books yet to read.
          </p>

          <!-- Genre Summary Section -->
          <div class="genre-summary">
            <h3>🤓 Interests by Genre</h3>
            <div class="genre-list" id="genre-list"></div>
          </div>

          <div class="wishlist-grid" id="wishlist-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Thoughts Modal -->
  <div id="thoughtsModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <img height="30px" style="overflow: visible;"
        src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍🏽</text></svg>"
        alt="thoughts" />
      <h3 id="thoughtsTitle">My Thoughts</h3>
      <p id="thoughtsContent"></p>
    </div>
  </div>

  <script src="script.js"></script>
  <!-- Google tag (gtag.js) -->

</body>
